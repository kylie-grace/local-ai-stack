# HolyClaude — AI coding workstation
# Run SEPARATELY from the main local-ai stack so it can be stopped independently
# to free resources without taking down LiteLLM/Gemini/Claude.
#
# Start:  docker compose -f docker-compose.holyclaude.yml up -d
# Stop:   docker compose -f docker-compose.holyclaude.yml down
# Logs:   docker compose -f docker-compose.holyclaude.yml logs -f
#
# Web UI: http://localhost:3001
# First run: HolyClaude bootstraps itself automatically (copies settings, configures git).
#
# Requires: main stack (docker-compose.yml) running so LiteLLM is reachable.
# All Claude Code requests route through LiteLLM → CLIProxyAPI/Copilot/local models.

services:

  holy-claude:
    image: coderluii/holyclaude:latest
    container_name: holy-claude
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"     # HolyClaude web UI — localhost only
    environment:
      # Route all Claude Code requests through the local-ai LiteLLM proxy.
      # host.docker.internal resolves to the Mac's localhost from inside Docker.
      ANTHROPIC_BASE_URL: "http://host.docker.internal:4000"
      ANTHROPIC_API_KEY: "${LITELLM_MASTER_KEY}"
      # Match your Mac's UID/GID so workspace files have correct ownership.
      PUID: "501"
      PGID: "20"
    volumes:
      # Persistent home directory — settings, Claude history, tool configs survive restarts.
      - holy-claude-home:/home/claude
      # Your working directory — bind-mounted so files are accessible on the host too.
      - ./holyclaude/workspace:/workspace
      # Pre-configure Docker MCP for Claude Code inside the container.
      # claude.json sets up MCP_DOCKER so `docker mcp gateway run` is available as a tool.
      - ./holyclaude/claude.json:/home/claude/.claude.json:ro
      # Docker socket — required for Docker MCP gateway to manage containers.
      # Security note: this gives the container full Docker control.
      # Acceptable since holy-claude is localhost-only and operator-controlled.
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      # Ensure host.docker.internal resolves correctly on macOS Docker Desktop.
      - "host.docker.internal:host-gateway"

volumes:
  holy-claude-home:
