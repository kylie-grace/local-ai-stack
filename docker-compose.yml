# LiteLLM Local Proxy Stack
# All ports bound to 127.0.0.1 — nothing reachable from outside this machine.

services:

  # ── PostgreSQL — LiteLLM's backend database ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: litellm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - litellm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── LiteLLM Proxy ────────────────────────────────────────────────────────
  # UI at http://localhost:4000/ui  (login with your LITELLM_MASTER_KEY)
  # API at http://localhost:4000/v1
  litellm:
    image: ghcr.io/berriai/litellm:main-latest@sha256:7c311546c25e7bb6e8cafede9fcd3d0d622ac636b5c9418befaa32e85dfb0186
    container_name: litellm
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://litellm:${POSTGRES_PASSWORD}@postgres:5432/litellm"
      LITELLM_TELEMETRY: "False"
      DISABLE_TELEMETRY_REPORTING: "True"
      LITELLM_LOG: "ERROR"
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    memswap_limit: 2g
    cpus: "2"
    networks:
      - litellm-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:4000/health/liveliness\", timeout=5)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Open WebUI — unified chat frontend ──────────────────────────────────
  # Chat UI at http://localhost:3000
  # First run: create an admin account at the signup page.
  # Models pulled automatically from LiteLLM.
  # MCP tools available via mcp-proxy container (proxies to host-side gateway at :8811)
  open-webui:
    image: ghcr.io/open-webui/open-webui:latest@sha256:7f1b0a1a50cfbac23da3b16f96bc968fd757b26dc9e54e93813d61768ea9184e
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OPENAI_API_BASE_URL: "http://litellm:4000/v1"
      OPENAI_API_KEY: "${LITELLM_MASTER_KEY}"
      WEBUI_AUTH: "true"
      ENABLE_SIGNUP: "true"
      ENABLE_OLLAMA_API: "false"
      TELEMETRY_ENABLED: "false"
      ENABLE_MESSAGE_RATING: "true"
      ENABLE_TAGS_GENERATION: "true"
      ENABLE_TITLE_GENERATION: "true"
      ENABLE_AUTOCOMPLETE_GENERATION: "true"
      ENABLE_API_KEYS: "true"
    volumes:
      - open-webui-data:/app/backend/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    memswap_limit: 1g
    cpus: "1"
    networks:
      - litellm-net

  # ── MCP Proxy — Host-header rewrite for Docker → host MCP gateway ────────
  # The Docker MCP gateway (launchd, port 8811) rejects Host headers other than
  # "localhost" as DNS-rebinding protection. This nginx proxy rewrites the Host
  # header so Open WebUI can reach the gateway from inside Docker.
  mcp-proxy:
    image: nginxinc/nginx-unprivileged:alpine
    container_name: mcp-proxy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./mcp-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 64m
    memswap_limit: 64m
    cpus: "0.25"
    networks:
      - litellm-net

  # ── SearXNG — private local metasearch engine ───────────────────────────
  # Browser UI at http://localhost:8080
  # API at http://searxng:8080 (internal Docker DNS — used by Open WebUI web search)
  searxng:
    image: searxng/searxng:latest@sha256:c9100c29c14a77d5289263a671580226c3b8a396a1a0130d2f500f57076a0119
    container_name: searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: "http://localhost:8080/"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "1"
    networks:
      - litellm-net

networks:
  litellm-net:
    driver: bridge

volumes:
  postgres-data:
  open-webui-data:
