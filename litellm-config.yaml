# LiteLLM Proxy Configuration
# Backends: UM GPT Toolkit (University of Michigan), LM Studio (local)
#
# Security:
#   - success_callback / failure_callback both empty → no prompt/response exfiltration
#   - telemetry: false → no usage data sent to LiteLLM servers
#   - disable_spend_logs: false → spend tracked in Postgres (view at localhost:4000/ui)
#
# Pricing note:
#   input_cost_per_token / output_cost_per_token are USD per single token.
#   Values converted from UM GPT Toolkit pricing page (per 1M tokens),
#   captured 2026-06-12: https://its.umich.edu/computing/ai/pricing#toolkit-costs

