# ── ROUTER / FAILOVER SETTINGS ──────────────────────────────────────────────
router_settings:
  num_retries: 2
  retry_after: 5
  fallbacks:
    # UM GPT Toolkit → local LM Studio on rate limit / outage
    - {"umgpt/claude-sonnet-4-6": ["local/qwen3-coder"]}
    - {"umgpt/claude-opus-4-7":   ["local/devstral-24b"]}
    - {"umgpt/claude-opus-4-6":   ["local/devstral-24b"]}
    - {"umgpt/gpt-5":             ["umgpt/gpt-5.1", "local/qwen3.6-35b"]}
    - {"umgpt/o3":                ["umgpt/o1"]}
    # Embedding fallback: local Nomic → UM GPT cloud if LM Studio is off
    - {"local/nomic-embed-v1.5":  ["umgpt/text-embedding-3-small"]}
    - {"local/nomic-embed-v2":    ["umgpt/text-embedding-3-large"]}

# ── GUARDRAILS ──────────────────────────────────────────────────────────────
# hide-secrets: detect-secrets library scans model RESPONSES for leaked API
# keys, tokens, passwords and redacts them. Post-call only — credential-passing
# in prompts (Claude Code, MCP tools, etc.) is intentionally left unblocked.
guardrails:
  - guardrail_name: "no-secrets-in-responses"
    litellm_params:
      guardrail: hide-secrets
      default_on: true
      mode: "post_call"

# ── GENERAL SETTINGS ────────────────────────────────────────────────────────
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  disable_spend_logs: false
  success_callback: []
  failure_callback: []

# ── LITELLM LIBRARY SETTINGS ────────────────────────────────────────────────
litellm_settings:
  telemetry: false
  set_verbose: false
  drop_params: true
  request_timeout: 120
