[uwsgi]
# Run as the searxng user inside the container
uid = searxng
gid = searxng

# Workers and threads
workers = 4
threads = 4

# Socket
socket = /run/uwsgi/app.socket
chmod-socket = 666

# App
single-interpreter = true
master = true
plugin = python3
lazy-apps = true
enable-threads = 4
module = searx.webapp
pythonpath = /usr/local/searxng/
chdir = /usr/local/searxng/searx/

# Process naming
auto-procname = true

# Privacy — disable per-request logging
disable-logging = true
log-5xx = true

# Timeouts and limits
buffer-size = 8192
harakiri = 30
max-requests = 1000
