# CLIProxyAPI Configuration
# Web UI accessible at http://localhost:8317

host: "0.0.0.0"
port: 8317

auth-dir: "/root/.cli-proxy-api"

# Restrict callers to LiteLLM only (matches api_key in litellm-config.yaml)
api-keys:
  - "internal"

# Management panel — local access only, panel auto-downloads from GitHub on first start
remote-management:
  allow-remote: false
  disable-control-panel: false
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"

debug: false
logging-to-file: true
logs-max-total-size-mb: 30
